<!doctype html>
<html lang="en">
<body style="margin:0;padding:0;background:#f6f7f9;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f7f9;">
        <tr>
            <td align="center" style="padding:24px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
                    <tr>
                        <td style="padding:24px 24px 0 24px;font-family:Arial,Helvetica,sans-serif;">
                            <h1 style="margin:0 0 12px 0;font-size:20px;line-height:28px;color:#111827;">
                                Welcome Private,
                            </h1>
                            <p style="margin:0 0 16px 0;font-size:14px;line-height:20px;color:#374151;">
                                Please confirm your email to activate your <strong>{{AppName}}</strong> account.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:0 24px 24px 24px;font-family:Arial,Helvetica,sans-serif;">
                            <a href="{{ConfirmUrl}}" style="display:inline-block;padding:12px 20px;text-decoration:none;border-radius:6px;background:#2563eb;color:#ffffff;font-weight:bold;">
                                Confirm email
                            </a>
                            <p style="margin:16px 0 0 0;font-size:12px;line-height:18px;color:#6b7280;">
                                This link is valid for <strong>{{TokenValidityHours}} hour(s)</strong>.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 24px 24px 24px;font-family:Arial,Helvetica,sans-serif;">
                            <p style="margin:0;font-size:12px;line-height:18px;color:#6b7280;">
                                If you didn’t request this, please ignore this email or contact us at {{SupportEmail}}.
                            </p>
                        </td>
                    </tr>
                </table>
                <p style="margin:12px 0 0 0;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:18px;color:#9ca3af;">
                    © {{Year}} {{AppName}} • All rights reserved.
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
